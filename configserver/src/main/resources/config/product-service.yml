spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/product?options=-c%20TimeZone=Asia/Kolkata
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
#    database: POSTGRESQL
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format-sql: true
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

management:
  endpoints:
    web:
      exposure:
        include: "*"

server:
  port: 8081
